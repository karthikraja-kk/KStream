name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Phone APK
      run: ./gradlew :app:assembleDebug

    - name: Build TV APK
      run: ./gradlew :tv:assembleDebug
      continue-on-error: true # Since we haven't fully implemented TV yet

    - name: Upload Phone APK
      uses: actions/upload-artifact@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        name: KStream-phone-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload TV APK
      uses: actions/upload-artifact@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        name: KStream-tv-debug.apk
        path: tv/build/outputs/apk/debug/tv-debug.apk
        retention-days: 7
